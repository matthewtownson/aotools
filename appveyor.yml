build: false

environment:
  matrix:
    - PYTHON_VERSION: "3.10"
      MINICONDA: C:\Miniconda310-x64
    - PYTHON_VERSION: "3.11"
      MINICONDA: C:\Miniconda311-x64

branches:
  only:
    - main

init:
  - "ECHO %PYTHON_VERSION% %MINICONDA%"

install:
  - "set PATH=%MINICONDA%;%MINICONDA%\\Scripts;%PATH%"
  - conda config --set always_yes yes --set changeps1 no
  - conda update -q conda
  - conda info -a
  - "conda create -q -n test-environment python=%PYTHON_VERSION% numpy>=1.26.2 scipy>=1.11.3 matplotlib>=3.8 numba>=0.59 pytest"
  - activate test-environment
  - python -m pip install --upgrade pip
  - pip install .

test_script:
  - pytest -q
